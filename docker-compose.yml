version: '3.8'
services:
  db:
    image: postgres:15
    container_name: Spring-Identity-Core-db
    environment:
      POSTGRES_USER: ${USER_NAME}
      POSTGRES_PASSWORD: ${PASSWORD}
      POSTGRES_DB: postgres
    ports:
      - "5432:5432"

  app:
    build: .
    container_name: SpringIdentityCore
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: ${DB_URL}
      SPRING_DATASOURCE_USERNAME: ${USER_NAME}
      SPRING_DATASOURCE_PASSWORD: ${PASSWORD}